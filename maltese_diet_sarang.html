<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Sarang's Diet 🐶</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Helvetica Neue',Arial,sans-serif; }
html,body { width:100%; height:100%; overflow:hidden; background:#000; }
#c { display:block; width:100vw; height:100vh; touch-action:none; }

#ui {
  position:fixed; top:0; left:0; right:0;
  display:flex; justify-content:space-between; align-items:flex-start;
  padding:18px 24px; pointer-events:none; z-index:10;
}
.pill {
  background:rgba(0,0,0,0.35);
  border:1px solid rgba(255,255,255,0.18);
  border-radius:30px;
  color:rgba(255,255,255,0.88);
  font-size:13px; padding:7px 18px;
  letter-spacing:0.03em;
  backdrop-filter:blur(8px);
}
#center-ui {
  position:fixed; top:18px; left:50%; transform:translateX(-50%);
  text-align:center; pointer-events:none; z-index:10;
  white-space:nowrap;
}
#status-msg {
  color:rgba(255,255,255,0.9);
  font-size:13px; letter-spacing:0.04em;
  text-shadow:0 1px 8px rgba(0,0,0,0.6);
  transition:opacity 0.3s;
}
#jump-dots {
  display:flex; gap:6px; justify-content:center; margin-top:8px;
}
.dot {
  width:8px; height:8px; border-radius:50%;
  background:rgba(255,255,255,0.25);
  border:1px solid rgba(255,255,255,0.4);
  transition:all 0.2s;
}
.dot.done { background:#ffe066; border-color:#ffcc00; box-shadow:0 0 6px #ffcc0088; }

#charge-bar-wrap {
  position:fixed; bottom:40px; left:50%; transform:translateX(-50%);
  width:180px; height:8px;
  background:rgba(255,255,255,0.12);
  border-radius:8px; overflow:hidden;
  opacity:0; transition:opacity 0.2s;
  z-index:10;
}
#charge-bar {
  height:100%; width:0%; border-radius:8px;
  background:linear-gradient(90deg,#66ccff,#ff66aa);
  transition:background 0.1s;
}

#snack-msg {
  position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
  font-size:20px; font-weight:700;
  color:#fff; text-shadow:0 0 30px #fff8;
  pointer-events:none; z-index:20;
  opacity:0; transition:opacity 0.4s;
  text-align:center; line-height:1.6;
}

.float-txt {
  position:fixed;
  color:#fff; font-size:15px; font-weight:700;
  pointer-events:none; z-index:30;
  animation:floatUp 1.1s ease-out forwards;
}
@keyframes floatUp {
  0%   { opacity:1; transform:translateY(0) scale(1); }
  100% { opacity:0; transform:translateY(-60px) scale(0.7); }
}

.ui-btn {
  pointer-events:all;
  background:rgba(0,0,0,0.3);
  border:1px solid rgba(255,255,255,0.3);
  border-radius:30px;
  color:rgba(255,255,255,0.8);
  font-size:12px; padding:7px 18px;
  cursor:pointer; letter-spacing:0.03em;
  transition:all 0.2s; backdrop-filter:blur(6px);
}
.ui-btn:hover { background:rgba(255,255,255,0.1); }
</style>
</head>
<body>
<canvas id="c"></canvas>

<div id="ui">
  <div class="pill" id="weight-pill">⚖️ <span id="weightVal">100</span> kg</div>
  <button class="ui-btn" onclick="resetGame()">↺ Restart</button>
</div>

<div id="center-ui">
  <div id="status-msg">Drag down anywhere to jump! 🐾</div>
  <div id="jump-dots"></div>
</div>

<div id="charge-bar-wrap">
  <div id="charge-bar"></div>
</div>

<div id="snack-msg"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ── RENDERER ─────────────────────────────────────────────────
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias:true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.shadowMap.enabled = false;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.05;

// ── SCENE ────────────────────────────────────────────────────
const scene = new THREE.Scene();

// ── DYNAMIC SKY ───────────────────────────────────────────────
// 3분(180초) 동안 밤 → 새벽 → 낮으로 변화
const SKY_DURATION = 60; // 1분
const SKY_START_T = 0.65; // 아침부터 시작
const gameStartTime = performance.now() - SKY_START_T * SKY_DURATION * 1000;

// 하늘 색상 keyframes: [t(0~1), top, bottom]
const SKY_KEYS = [
  { t:0,    top:'#060e1c', bot:'#0d2a4a' }, // 깊은 밤
  { t:0.25, top:'#0d1a3a', bot:'#1a3a6a' }, // 한밤
  { t:0.45, top:'#1a1a4a', bot:'#4a2a6a' }, // 새벽 전
  { t:0.55, top:'#3a1a2a', bot:'#c85a2a' }, // 일출 (붉은 새벽)
  { t:0.65, top:'#1a4a8a', bot:'#e87a3a' }, // 해뜨는 중
  { t:0.78, top:'#2a6aaa', bot:'#87ceeb' }, // 아침
  { t:1.0,  top:'#1a7ac8', bot:'#d4eeff' }, // 맑은 낮
];

function lerpColor(a, b, t){
  const ah=parseInt(a.slice(1),16), bh=parseInt(b.slice(1),16);
  const ar=(ah>>16)&255, ag=(ah>>8)&255, ab=ah&255;
  const br=(bh>>16)&255, bg=(bh>>8)&255, bb=bh&255;
  const r=Math.round(ar+(br-ar)*t);
  const g=Math.round(ag+(bg-ag)*t);
  const bl2=Math.round(ab+(bb-ab)*t);
  return '#'+[r,g,bl2].map(v=>v.toString(16).padStart(2,'0')).join('');
}

function getSkyColors(t){
  t = Math.min(1, Math.max(0, t));
  let k0=SKY_KEYS[0], k1=SKY_KEYS[1];
  for(let i=0;i<SKY_KEYS.length-1;i++){
    if(t>=SKY_KEYS[i].t && t<=SKY_KEYS[i+1].t){ k0=SKY_KEYS[i]; k1=SKY_KEYS[i+1]; break; }
  }
  const lt=(t-k0.t)/Math.max(0.001,k1.t-k0.t);
  return { top: lerpColor(k0.top,k1.top,lt), bot: lerpColor(k0.bot,k1.bot,lt) };
}

const skyC = document.createElement('canvas');
skyC.width=2; skyC.height=512;
const skyCtx = skyC.getContext('2d');
const skyTex = new THREE.CanvasTexture(skyC);
scene.background = skyTex;

function updateSky(t){
  const {top,bot} = getSkyColors(t);
  const sg = skyCtx.createLinearGradient(0,0,0,512);
  sg.addColorStop(0, top);
  sg.addColorStop(1, bot);
  skyCtx.fillStyle=sg;
  skyCtx.fillRect(0,0,2,512);
  skyTex.needsUpdate=true;
}
updateSky(0);

const camera = new THREE.PerspectiveCamera(52, innerWidth/innerHeight, 0.1, 200);
camera.position.set(0, 1, 12);
camera.lookAt(0,0,0);

// ── LIGHTING ─────────────────────────────────────────────────
const ambientLight = new THREE.AmbientLight(0x223355, 0.5); // 밤엔 어둡게
scene.add(ambientLight);
const sun = new THREE.DirectionalLight(0xfff4e0, 0.3); // 처음엔 약하게
sun.position.set(7,14,6);
scene.add(sun);
const rim = new THREE.DirectionalLight(0x88bbff,0.4);
rim.position.set(-6,4,-8); scene.add(rim);

// ── STARS: 낮이 되면 사라지게
const starGeo=new THREE.BufferGeometry();
const starPos=[];
for(let i=0;i<350;i++) starPos.push((Math.random()-.5)*180,Math.random()*90-5,(Math.random()-.5)*80-15);
starGeo.setAttribute('position',new THREE.Float32BufferAttribute(starPos,3));
const starMat=new THREE.PointsMaterial({color:0xffffff,size:0.11,transparent:true,opacity:0.85});
const stars=new THREE.Points(starGeo,starMat);
scene.add(stars);

// ── GROUND ───────────────────────────────────────────────────
const GROUND_Y = -3.2;
const groundMesh = new THREE.Mesh(
  new THREE.PlaneGeometry(20,14),
  new THREE.MeshLambertMaterial({color:0x0a1e38})
);
groundMesh.rotation.x=-Math.PI/2;
groundMesh.position.y=GROUND_Y;
groundMesh.receiveShadow=true;
scene.add(groundMesh);

// ── BUILD MALTESE ────────────────────────────────────────────
function buildMaltese() {
  const g      = new THREE.Group();
  const white  = new THREE.MeshLambertMaterial({color:0xffffff});
  const offwhite= new THREE.MeshLambertMaterial({color:0xf2f2ee});
  const grey   = new THREE.MeshLambertMaterial({color:0xaaaaaa});
  const black  = new THREE.MeshLambertMaterial({color:0x111111});
  const tongue = new THREE.MeshLambertMaterial({color:0xff6e9c});
  const toothMat= new THREE.MeshLambertMaterial({color:0xffffff});

  // ── 몸통: 핑크 배 그라데이션
  const bodyGeo = new THREE.SphereGeometry(1.1, 32, 32);
  const bodyColors = [];
  const bPos = bodyGeo.attributes.position;
  for(let i=0;i<bPos.count;i++){
    const y = bPos.getY(i);
    const z = bPos.getZ(i);
    const t = Math.min(1, Math.max(0, (-y/1.1)*0.7 + (z/1.1)*0.3) * 1.6);
    bodyColors.push(1, 1-t*0.3, 1-t*0.22);
  }
  bodyGeo.setAttribute('color', new THREE.Float32BufferAttribute(bodyColors, 3));
  const body = new THREE.Mesh(bodyGeo, new THREE.MeshLambertMaterial({vertexColors:true}));
  body.castShadow=true; g.add(body);

  // ── 머리
  const head = new THREE.Mesh(new THREE.SphereGeometry(0.68, 32, 32), white);
  head.position.set(0, 1.1, 0.3);
  head.castShadow=true; g.add(head);

  // ── 귀: 더 작게
  const earPivots = [];
  [-1,1].forEach((s)=>{
    const pivot = new THREE.Group();
    pivot.position.set(s*0.44, 1.62, 0.42);
    g.add(pivot);
    const ear = new THREE.Mesh(new THREE.SphereGeometry(0.26, 20, 20), offwhite);
    ear.scale.set(1.0, 0.38, 0.9);
    ear.position.set(s*0.1, -0.06, 0.0);
    ear.rotation.z = s * (-Math.PI / 4);
    ear.castShadow=true;
    pivot.add(ear);
    earPivots.push(pivot);
  });
  g.userData.earPivots = earPivots;

  // ── 주둥이 (center z=0.96, r=0.24, zScale=0.85 → 앞면 z=1.164)
  const snout = new THREE.Mesh(new THREE.SphereGeometry(0.24, 20, 20), grey);
  snout.scale.set(0.9, 0.5, 0.85);
  snout.position.set(0, 1.12, 0.96); g.add(snout);

  // ── 코
  const nose = new THREE.Mesh(new THREE.SphereGeometry(0.068, 14, 14), black);
  nose.scale.set(1.1, 0.75, 0.9);
  nose.position.set(0, 1.22, 1.02); g.add(nose);

  // ── 눈 × 2
  [[-0.3, 1.35, 0.82],[0.3, 1.35, 0.82]].forEach(([x,y,z])=>{
    const eye = new THREE.Mesh(new THREE.SphereGeometry(0.095, 18, 18), black);
    eye.position.set(x,y,z); g.add(eye);
  });

  // ── 이빨: 주둥이 앞면(z=1.164) 바깥으로, 아래 방향 뾰족
  [-0.11, 0.11].forEach(x=>{
    const tooth = new THREE.Mesh(new THREE.ConeGeometry(0.034, 0.1, 8), toothMat);
    tooth.position.set(x, 1.16, 1.18); g.add(tooth);
  });

  // ── 혀: 간식 먹을 때
  const tongueGroup = new THREE.Group();
  tongueGroup.position.set(0, 0.9, 1.0);
  tongueGroup.visible = false;
  const tongueMesh = new THREE.Mesh(new THREE.SphereGeometry(0.1,12,12), tongue);
  tongueMesh.scale.set(1.1, 0.5, 0.9);
  tongueGroup.add(tongueMesh);
  g.add(tongueGroup);
  g.userData.tongueGroup = tongueGroup;

  // ── 다리 × 4
  [[-0.48,-0.9,0.52],[0.48,-0.9,0.52],[-0.42,-0.9,-0.42],[0.42,-0.9,-0.42]].forEach(([x,y,z])=>{
    const leg = new THREE.Mesh(new THREE.SphereGeometry(0.26, 16, 16), white);
    leg.scale.set(1, 0.82, 1);
    leg.position.set(x,y,z); leg.castShadow=true; g.add(leg);
  });

  // ── 꼬리
  const tail = new THREE.Mesh(new THREE.SphereGeometry(0.18,14,14), white);
  tail.position.set(0, 0.35, -1.15); tail.castShadow=true; g.add(tail);
  g.userData.tail = tail;

  return g;
}

const dog = buildMaltese();
scene.add(dog);

// Shadow blob
const shadowBlob = new THREE.Mesh(
  new THREE.CircleGeometry(1.15,24),
  new THREE.MeshBasicMaterial({color:0x000000,transparent:true,opacity:.2,depthWrite:false})
);
shadowBlob.rotation.x=-Math.PI/2;
shadowBlob.position.y=GROUND_Y+.02;
scene.add(shadowBlob);

// ── SNACK ────────────────────────────────────────────────────
const SNACK_TYPES = ['🍕','🍔','🌮','🍜','🍣','🧁','🍩','🍗','🥩','🌭','🍦','🥐'];
let snackMesh = null;
let snackObj  = { x:0, y:20, vy:0, active:false, emoji:'' };

function makeEmojiTexture(emoji) {
  const c = document.createElement('canvas');
  c.width = 128; c.height = 128;
  const ctx = c.getContext('2d');
  ctx.font = '88px serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(emoji, 64, 68);
  return new THREE.CanvasTexture(c);
}

function makeSnackMesh(emoji) {
  const g = new THREE.Group();
  const tex = makeEmojiTexture(emoji);
  const mat = new THREE.SpriteMaterial({ map: tex, transparent: true });
  const sprite = new THREE.Sprite(mat);
  sprite.scale.set(1.1, 1.1, 1);
  g.add(sprite);
  return g;
}

// ── CHARGE ARROW ─────────────────────────────────────────────
// Arrow showing jump direction while charging
let arrowGroup = null;
function makeArrow() {
  const g=new THREE.Group();
  const shaft=new THREE.Mesh(
    new THREE.CylinderGeometry(.04,.04,.7,8),
    new THREE.MeshBasicMaterial({color:0x88ddff,transparent:true,opacity:.75})
  );
  shaft.position.y=.35; g.add(shaft);
  const head=new THREE.Mesh(
    new THREE.ConeGeometry(.12,.25,8),
    new THREE.MeshBasicMaterial({color:0xaaeeff,transparent:true,opacity:.85})
  );
  head.position.y=.85; g.add(head);
  g.visible=false;
  scene.add(g);
  return g;
}
arrowGroup=makeArrow();

// ── AUDIO ─────────────────────────────────────────────────────
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;
function getAudio(){ if(!audioCtx) audioCtx=new AudioCtx(); return audioCtx; }

function playBeep(freq=520, type='sine', dur=0.08, vol=0.18){
  try {
    const ctx=getAudio();
    const osc=ctx.createOscillator();
    const gain=ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type=type; osc.frequency.setValueAtTime(freq,ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(freq*1.3, ctx.currentTime+dur*0.4);
    gain.gain.setValueAtTime(vol,ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+dur);
    osc.start(ctx.currentTime); osc.stop(ctx.currentTime+dur);
  } catch(e){}
}

function playSqueak(){ // 삐익~ 귀여운 고음
  playBeep(780,'sine',0.12,0.15);
  setTimeout(()=>playBeep(920,'sine',0.09,0.12),60);
}
function playBoing(){ // 통~ 착지
  try {
    const ctx=getAudio();
    const osc=ctx.createOscillator();
    const gain=ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type='sine';
    osc.frequency.setValueAtTime(260,ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(80,ctx.currentTime+0.25);
    gain.gain.setValueAtTime(0.22,ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.25);
    osc.start(ctx.currentTime); osc.stop(ctx.currentTime+0.25);
  } catch(e){}
}
function playCharge(pct){ // 차지 중 삐삐
  playBeep(400+pct*300,'square',0.04,0.07);
}
function playCatch(){ // 냠냠 성공
  [0,80,160].forEach((t,i)=>setTimeout(()=>playBeep([660,780,1020][i],'sine',0.12,0.18),t));
}
function playFail(){
  playBeep(300,'sawtooth',0.18,0.2);
  setTimeout(()=>playBeep(220,'sawtooth',0.18,0.2),150);
}

// ── GAME STATE ───────────────────────────────────────────────
const FLOOR_Y   = GROUND_Y + 1.12;
const GRAVITY   = -0.018;
const SIDE_LIM  = 4.2;
const JUMPS_TO_SNACK = 10;
const START_WEIGHT = 100; // Sarang starts at 100kg
const GOAL_WEIGHT  = 4;   // target: 4kg

let px=0, py=FLOOR_Y, pz=0;
let vx=0, vy=0, vz=0;
let onGround=true;
let squishY=1, squishXZ=1;
let rotX=0, rotZ=0;
let frame=0;

// game progress
let jumpCount=0;
let weight=START_WEIGHT;
let totalLost=0;
let highJumpCombo=0; // consecutive high jumps for combo bonus
let phase='idle';
let chargeStart=0, chargeAmt=0;
let dragStartX=0, dragStartY=0;
let isDragging=false;
let jumpDir={x:0,y:1,z:0};
let lastJumpPower=0;
let chargeBeepFrame=0;

// UI refs
const statusEl  = document.getElementById('status-msg');
const dotsEl    = document.getElementById('jump-dots');
const chargeWrap= document.getElementById('charge-bar-wrap');
const chargeBar = document.getElementById('charge-bar');
const snackMsgEl= document.getElementById('snack-msg');
const weightEl  = document.getElementById('weightVal');

function buildDots() {
  dotsEl.innerHTML='';
  for(let i=0;i<JUMPS_TO_SNACK;i++){
    const d=document.createElement('div');
    d.className='dot'+(i<jumpCount?' done':'');
    dotsEl.appendChild(d);
  }
}
buildDots();

function floatTxt(txt,cx,cy){
  const d=document.createElement('div');
  d.className='float-txt'; d.textContent=txt;
  d.style.left=cx+'px'; d.style.top=cy+'px';
  document.body.appendChild(d);
  setTimeout(()=>d.remove(),1100);
}

function showSnackMsg(txt,sub=''){
  snackMsgEl.innerHTML=txt+(sub?'<br><span style="font-size:14px;opacity:.7">'+sub+'</span>':'');
  snackMsgEl.style.opacity='1';
  setTimeout(()=>{ snackMsgEl.style.opacity='0'; },2000);
}

// ── POINTER ──────────────────────────────────────────────────
function toNDC(cx,cy){
  const r=canvas.getBoundingClientRect();
  return { x:((cx-r.left)/r.width)*2-1, y:-((cy-r.top)/r.height)*2+1 };
}

function hitDog(cx,cy){
  const ndc=toNDC(cx,cy);
  const ray=new THREE.Raycaster();
  ray.setFromCamera(ndc,camera);
  return ray.intersectObjects(dog.children,true).length>0;
}

function onDown(cx,cy){
  if(phase==='airborne'||phase==='won') return;
  isDragging=true;
  dragStartX=cx; dragStartY=cy;
  chargeStart=performance.now();
  chargeAmt=0;
  chargeWrap.style.opacity='1';
  chargeBar.style.width='0%';
  phase='charging';
  statusEl.textContent='Charging... pull more to jump higher!';
}

function onMove(cx,cy){
  if(!isDragging||phase!=='charging') return;

  const elapsed=(performance.now()-chargeStart)/1000;
  chargeAmt=Math.min(1, elapsed/1.5);

  // drag vector (screen space, downward = launch up)
  const dx=cx-dragStartX;
  const dy=cy-dragStartY; // positive = dragged down

  // only charge if dragging downward
  const downward=Math.max(0,dy);
  const chargeFromDist=Math.min(1, downward/120);
  chargeAmt=Math.max(chargeAmt,chargeFromDist);

  // lateral direction
  const lateralNorm=Math.max(1,Math.abs(dx));
  jumpDir.x = dx/Math.max(60,Math.abs(dx)+Math.abs(dy)) * -1;
  jumpDir.y = 1;

  // bar color
  const pct=chargeAmt*100;
  chargeBar.style.width=pct+'%';
  chargeBar.style.background=chargeAmt<.5
    ?'linear-gradient(90deg,#66ccff,#aaffcc)'
    :'linear-gradient(90deg,#ffcc44,#ff6688)';

  // position arrow above dog
  const power=0.18+chargeAmt*0.32;
  arrowGroup.visible=true;
  arrowGroup.position.set(px,py+1.4,pz);
  const angle=Math.atan2(jumpDir.x,1);
  arrowGroup.rotation.z=-angle;
  arrowGroup.scale.setScalar(0.7+chargeAmt*.8);
}

function onUp(cx,cy){
  if(!isDragging||phase!=='charging') return;
  isDragging=false;
  arrowGroup.visible=false;
  chargeWrap.style.opacity='0';

  if(chargeAmt<0.05){ phase='idle'; statusEl.textContent='Drag down to jump! 🐾'; return; }

  const power=0.18+chargeAmt*0.34;
  lastJumpPower=power;
  vy=power;
  vx=jumpDir.x*power*0.65;
  vz=0;
  squishY=0.62; squishXZ=1.32;
  phase='airborne';
  playSqueak();
  statusEl.textContent='Jump! 🐶💨';
}

canvas.addEventListener('mousedown',e=>onDown(e.clientX,e.clientY));
window.addEventListener('mousemove',e=>onMove(e.clientX,e.clientY));
window.addEventListener('mouseup',  e=>onUp(e.clientX,e.clientY));
canvas.addEventListener('touchstart',e=>{e.preventDefault();const t=e.touches[0];onDown(t.clientX,t.clientY);},{passive:false});
window.addEventListener('touchmove', e=>{e.preventDefault();const t=e.touches[0];onMove(t.clientX,t.clientY);},{passive:false});
window.addEventListener('touchend',  e=>{e.preventDefault();const t=e.changedTouches[0];onUp(t.clientX,t.clientY);},{passive:false});

// ── SPAWN SNACK ───────────────────────────────────────────────
function spawnSnack(){
  phase='snack_falling';
  const emoji=SNACK_TYPES[Math.floor(Math.random()*SNACK_TYPES.length)];
  snackObj.emoji=emoji;
  // 랜덤 X 위치 (개 위치 기준으로 일부러 다른 곳에)
  let sx;
  do { sx=(Math.random()-.5)*7; } while(Math.abs(sx-px)<1.5);
  snackObj.x=Math.max(-3.5,Math.min(3.5,sx));
  snackObj.y=9;
  snackObj.vy=0;
  snackObj.active=true;
  snackObj.fallSpeed=0.025;

  if(snackMesh){ scene.remove(snackMesh); }
  snackMesh=makeSnackMesh(emoji);
  snackMesh.position.set(snackObj.x,snackObj.y,0);
  scene.add(snackMesh);

  showSnackMsg('Snack incoming! '+emoji,'Jump and catch it! 🐶');
  statusEl.textContent='Snack falling! Jump to catch it '+emoji;
  jumpCount=0; buildDots();
}

// ── RESET ─────────────────────────────────────────────────────
function resetGame(){
  px=0; py=FLOOR_Y; pz=0;
  vx=0; vy=0; vz=0;
  jumpCount=0; weight=START_WEIGHT; totalLost=0; highJumpCombo=0; phase='idle';
  chargeAmt=0; isDragging=false;
  arrowGroup.visible=false;
  chargeWrap.style.opacity='0';
  if(snackMesh){ scene.remove(snackMesh); snackMesh=null; }
  snackObj.active=false;
  squishY=1; squishXZ=1; rotX=0; rotZ=0;
  buildDots();
  statusEl.textContent='Drag down to jump! 🐾';
  weightEl.textContent=weight;
  showSnackMsg('Let\'s go Sarang! 🐶','Goal: lose 4 kg!');
}
window.resetGame=resetGame;

// ── ANIMATE ───────────────────────────────────────────────────
let lastLandFrame=-999;
let snackCaughtFrame=-999;

function animate(){
  requestAnimationFrame(animate);
  frame++;

  // Physics — only pause when actively charging AND on ground
  const chargingOnGround = (phase==='charging' && onGround);
  if(!chargingOnGround){
    vy += GRAVITY;
    px += vx; py += vy; pz += vz;
    vx *= 0.985; vz *= 0.985;
  }

  // Floor landing
  if(py <= FLOOR_Y){
    const wasAirborne = !onGround; // were we in the air last frame?
    py = FLOOR_Y;

    if(wasAirborne && Math.abs(vy) > 0.02){
      playBoing();
      squishY=0.75; squishXZ=1.18;
      lastLandFrame=frame;

      if(phase==='airborne'){
        const isHighJump = lastJumpPower >= 0.28;
        let lostKg;
        if(isHighJump){
          highJumpCombo++;
          if(highJumpCombo >= 2){
            lostKg = 3;
            floatTxt('🔥 Combo! -'+lostKg+'kg', innerWidth/2, innerHeight*0.32);
          } else {
            lostKg = 2;
            floatTxt('-'+lostKg+'kg 💪', innerWidth/2, innerHeight*0.38);
          }
        } else {
          highJumpCombo = 0;
          lostKg = 0.5;
          floatTxt('-'+lostKg+'kg', innerWidth/2, innerHeight*0.38);
        }
        weight = Math.max(GOAL_WEIGHT, parseFloat((weight-lostKg).toFixed(1)));
        weightEl.textContent = weight;
        jumpCount++;
        buildDots();

        if(weight <= GOAL_WEIGHT){
          phase='won';
          showSnackMsg('🎉 Goal reached! Sarang is 4kg!','Slim & healthy Maltese 🐶✨');
          statusEl.textContent='Diet complete!! 🎉🐶';
          [0,120,240,360].forEach((t,i)=>setTimeout(()=>playBeep([520,660,780,1040][i],'sine',0.18,0.2),t));
        } else if(jumpCount >= JUMPS_TO_SNACK){
          spawnSnack();
        } else {
          phase='idle';
          statusEl.textContent=`${jumpCount}/${JUMPS_TO_SNACK} jumps! ${weight}kg → goal 4kg 💪`;
          setTimeout(()=>{ if(phase==='idle') statusEl.textContent='Drag down to jump! 🐾'; },1400);
        }
      } else if(phase==='snack_falling'){
        phase='idle';
        setTimeout(()=>{ if(phase==='idle') statusEl.textContent='Snack falling! Jump to catch it '+snackObj.emoji; },300);
      } else if(phase==='charging'){
        // landed while charging somehow — reset to idle
        phase='idle';
      }
    }

    vy = 0; vx *= 0.82; vz *= 0.82;
    onGround = true;
  } else {
    onGround = false;
  }

  // Side walls
  if(px> SIDE_LIM){px= SIDE_LIM;vx=-Math.abs(vx)*.5;}
  if(px<-SIDE_LIM){px=-SIDE_LIM;vx= Math.abs(vx)*.5;}

  // Squish recovery
  squishY  +=(1-squishY)*.16;
  squishXZ +=(1-squishXZ)*.16;

  // Charge squish preview
  if(phase==='charging'&&onGround){
    squishY  =1-chargeAmt*.24;
    squishXZ =1+chargeAmt*.2;
    if(frame-chargeBeepFrame > Math.max(4, 18-chargeAmt*14)){
      playCharge(chargeAmt);
      chargeBeepFrame=frame;
    }
  }

  // Dog position & scale
  const breathe=Math.sin(frame*.04)*.022;
  const idleBob=onGround?Math.sin(frame*.035)*.03:0;
  dog.position.set(px,py+idleBob,pz);
  dog.scale.set(squishXZ, squishY+breathe, squishXZ);

  // Air rotation
  if(!onGround){ rotX+=vz*.3; rotZ-=vx*.3; }
  rotX*=.92; rotZ*=.92;
  dog.rotation.x=rotX; dog.rotation.z=rotZ;
  dog.rotation.y=Math.sin(frame*.02)*.07;

  // Tail wag
  const wagFast=(phase==='snack_falling');
  dog.userData.tail.rotation.z=Math.sin(frame*(wagFast?.28:.1))*(wagFast?.7:.3);

  // ── 귀 팔락팔락: 공중에서 속도 비례, 착지 직후 통통
  const earPivots = dog.userData.earPivots;
  if(earPivots){
    const airFactor = onGround ? 0 : Math.min(1, Math.abs(vy) * 5.5);
    const baseFlap  = airFactor * 0.52;
    const landBounce= Math.max(0, 1 - (frame - lastLandFrame) / 16) * 0.38;
    const flutter   = Math.sin(frame * 0.28) * 0.05 * Math.max(airFactor, landBounce>0?1:0);
    earPivots[0].rotation.z =  baseFlap + landBounce + flutter;
    earPivots[1].rotation.z = -(baseFlap + landBounce + flutter);
  }

  // ── 혀: 간식 먹은 직후 80프레임 동안 쏙 나왔다가 들어감
  const tg = dog.userData.tongueGroup;
  if(tg){
    const elapsed = frame - snackCaughtFrame;
    if(elapsed >= 0 && elapsed < 80){
      tg.visible = true;
      const t = elapsed / 80;
      tg.position.y = 0.76 - Math.sin(t * Math.PI) * 0.07;
      tg.rotation.x = Math.sin(frame * 0.35) * 0.1;
    } else {
      tg.visible = false;
    }
  }

  // Shadow
  const h=py-FLOOR_Y;
  const ss=Math.max(.3,1-h*.1);
  shadowBlob.scale.set(ss,ss,1);
  shadowBlob.material.opacity=Math.max(.03,.2-h*.018);
  shadowBlob.position.x=px; shadowBlob.position.z=pz;

  // ── SNACK ────────────────────────────────────────────────────
  if(snackObj.active && snackMesh){
    // snack slow-accel fall
    snackObj.fallSpeed=Math.min(0.09, snackObj.fallSpeed+0.0004);
    snackObj.y-=snackObj.fallSpeed;
    snackMesh.position.set(snackObj.x, snackObj.y, 0);
    const pulse=0.95+Math.sin(frame*.18)*.06;
    snackMesh.scale.setScalar(pulse);

    // direction hint
    if(frame%60===0 && phase==='snack_falling'){
      const dir=snackObj.x>px?'right':'left';
      statusEl.textContent=`Jump ${dir} to catch it! ${snackObj.emoji}`;
    }

    // catch check
    const dx=px-snackObj.x;
    const dy=py-snackObj.y;
    const dist=Math.sqrt(dx*dx+dy*dy);
    if(dist<1.6 && !onGround){
      scene.remove(snackMesh); snackMesh=null; snackObj.active=false;
      playCatch();
      // snack adds a little weight back (calories...)
      weight=parseFloat(Math.min(START_WEIGHT, weight+0.5).toFixed(1));
      weightEl.textContent=weight;
      snackCaughtFrame=frame;
      showSnackMsg('Yum! '+snackObj.emoji+' caught!','+0.5kg... back to jumping! 🐶');
      floatTxt('+0.5kg 😅', innerWidth/2, innerHeight*0.4);
      phase='idle';
      squishY=1.25; squishXZ=0.8;
      statusEl.textContent='Snack eaten! Keep exercising! 💪';
      buildDots();
    }

    // missed — snack hits ground
    if(snackObj.y<=GROUND_Y+.35){
      scene.remove(snackMesh); snackMesh=null; snackObj.active=false;
      playFail();
      phase='idle';
      showSnackMsg('Missed! 😭','Jump 10 more times!');
      statusEl.textContent='Missed the snack... 😢 Keep jumping!';
      jumpCount=0; buildDots();
    }
  }

  // ── 하늘 & 조명 업데이트
  const elapsed = (performance.now()-gameStartTime)/1000;
  const skyT = Math.min(1, elapsed/SKY_DURATION);
  if(frame%4===0){
    updateSky(skyT);
    // 바닥색도 하늘에 맞게
    const gNight=0x0a1e38, gDay=0x3a7aaa;
    const gr=Math.round(((gNight>>16)&255)+(((gDay>>16)&255)-((gNight>>16)&255))*skyT);
    const gg=Math.round(((gNight>>8)&255)+(((gDay>>8)&255)-((gNight>>8)&255))*skyT);
    const gb=Math.round((gNight&255)+((gDay&255)-(gNight&255))*skyT);
    groundMesh.material.color.setRGB(gr/255,gg/255,gb/255);
  }
  starMat.opacity = Math.max(0, 1 - (skyT-0.45)*6);
  ambientLight.intensity = 0.5 + skyT*1.2;
  ambientLight.color.setHex(skyT < 0.5 ? 0x223355 : 0xc8d8f0);
  sun.intensity = 0.3 + skyT*2.2;

  renderer.render(scene,camera);
}

animate();

window.addEventListener('resize',()=>{
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});
</script>
</body>
</html>
